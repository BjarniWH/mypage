name: Deploy About Me to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build the about-me app
        run: npx nx build about-me --configuration=production --base-href=${{ steps.pages.outputs.base_path }}/

      - name: Post-build language shuffling
        run: |
          # The build puts everything in dist/apps/about-me/browser/[locale]
          # We want the default language (en-GB) at the root, and others in subdirectories.
          cd dist/apps/about-me/browser
          cp -r en-GB/* .
          # We keep fo and da folders as they are
          # We can remove the en-GB folder to keep it clean, but it doesn't hurt to stay.
          rm -rf en-GB

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The shuffling happened inside this directory
          path: 'dist/apps/about-me/browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy About Me to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build the about-me app
        run: npx nx build about-me --configuration=production --base-href=${{ steps.pages.outputs.base_path }}/

      - name: Post-build language shuffling
        run: |
          # The build puts everything in dist/apps/about-me/browser/[locale]
          # Angular appends the locale to the base href (e.g. /mypage/en-GB/), so we
          # must rewrite it back to the root base path before hoisting en-GB to root.
          BASE_PATH="${{ steps.pages.outputs.base_path }}"
          cd dist/apps/about-me/browser
          # Fix the base href in en-GB/index.html so assets resolve from the root
          sed -i "s|<base href=\"${BASE_PATH}/en-GB/\"|<base href=\"${BASE_PATH}/\"|g" en-GB/index.html
          cp -r en-GB/* .
          # We keep fo and da folders as they are
          rm -rf en-GB
          # GitHub Pages SPA fix: copy index.html as 404.html so Angular's router
          # can handle deep links (e.g. /mypage/fo/about) without a real 404.
          cp index.html 404.html
          cp da/index.html da/404.html
          cp fo/index.html fo/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The shuffling happened inside this directory
          path: 'dist/apps/about-me/browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy About Me to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Note: Node 24 is very new; 22 is the current LTS
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build the about-me app
        # --localize will trigger the build for all locales defined in project.json
        run: npx nx build about-me --configuration=production --base-href=${{ steps.pages.outputs.base_path }}/

      - name: Post-build language shuffling
        run: |
          cd dist/apps/about-me/browser

          # 1. Hoist en-GB to the root so the main URL works
          # This makes username.github.io/repo/ serve the English version by default
          cp -r en-GB/* .

          # 2. Fix the base href for the root index.html
          # The build created it as <base href="/repo/en-GB/">, but it's now at /repo/
          BASE_PATH="${{ steps.pages.outputs.base_path }}"
          sed -i "s|base href=\"${BASE_PATH}/en-GB/\"|base href=\"${BASE_PATH}/\"|g" index.html

          # 3. Create 404.html files for SPA routing support
          # This allows username.github.io/repo/da/about to work on refresh
          cp index.html 404.html
          cp da/index.html da/404.html
          cp fo/index.html fo/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/apps/about-me/browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

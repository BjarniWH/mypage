<header class="mobile-header">
  <button
    class="burger-menu"
    (click)="toggleSidebar($event)"
    aria-label="Open Menu"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <div class="mobile-logo">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
    </svg>
    <span>BjarniWH</span>
  </div>
</header>

<div
  class="layout-container"
  [class.sidebar-expanded]="isExpanded()"
  appCelestialBackground
>
  @if (isExpanded()) {
    <div class="sidebar-backdrop" (click)="toggleSidebar($event)"></div>
  }
  <aside
    #sidebar
    class="sidebar"
    [class.expanded]="isExpanded()"
    (mouseenter)="onSidebarEnter()"
    (mouseleave)="onSidebarLeave()"
  >
    <div class="sidebar-top">
      <button
        class="menu-toggle"
        (click)="toggleSidebar($event)"
        aria-label="Toggle Menu"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="6" x2="20" y2="6"></line>
          <line x1="4" y1="18" x2="20" y2="18"></line>
        </svg>
      </button>

      <nav class="nav">
        <!-- Logo / Home -->
        <a
          routerLink="/"
          fragment="hero"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false, fragment: 'exact' }"
          class="nav-link"
          aria-label="Home"
        >
          <div class="icon-container logo-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
              <polyline points="2 17 12 22 22 17"></polyline>
              <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
          </div>
          @if (isExpanded()) {
            <span class="nav-text logo-text">BjarniWH</span>
          }
        </a>

        <div class="nav-separator"></div>

        <!-- Section Fragment Links -->
        <a
          routerLink="/"
          fragment="about"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false, fragment: 'exact' }"
          class="nav-link"
          aria-label="About"
        >
          <div class="icon-container">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          @if (isExpanded()) {
            <span class="nav-text" i18n="@@nav_about">About</span>
          }
        </a>

        <a
          routerLink="/"
          fragment="experience"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false, fragment: 'exact' }"
          class="nav-link"
          aria-label="Experience"
        >
          <div class="icon-container">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="20" height="14" x="2" y="7" rx="2" ry="2"></rect>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            </svg>
          </div>
          @if (isExpanded()) {
            <span class="nav-text" i18n="@@nav_experience">Experience</span>
          }
        </a>

        <a
          routerLink="/"
          fragment="approach"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false, fragment: 'exact' }"
          class="nav-link"
          aria-label="Approach"
        >
          <div class="icon-container">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <circle cx="12" cy="12" r="6"></circle>
              <circle cx="12" cy="12" r="2"></circle>
            </svg>
          </div>
          @if (isExpanded()) {
            <span class="nav-text" i18n="@@nav_approach">Approach</span>
          }
        </a>

        <a
          routerLink="/"
          fragment="services"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false, fragment: 'exact' }"
          class="nav-link"
          aria-label="Services"
        >
          <div class="icon-container">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
              <polyline points="2 17 12 22 22 17"></polyline>
              <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
          </div>
          @if (isExpanded()) {
            <span class="nav-text" i18n="@@nav_services">Services</span>
          }
        </a>

        <a
          routerLink="/"
          fragment="contact"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false, fragment: 'exact' }"
          class="nav-link"
          aria-label="Contact"
        >
          <div class="icon-container">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"
              ></path>
            </svg>
          </div>
          @if (isExpanded()) {
            <span class="nav-text" i18n="@@nav_contact">Contact</span>
          }
        </a>

        <div class="sidebar-spacer"></div>

        <app-language-switcher
          [isExpanded]="isExpanded()"
        ></app-language-switcher>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper" [class.content-wrapper-expanded]="isExpanded()">
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
    <footer class="footer">
      <p>&copy; 2026 MyPage. Built with Angular & Nx.</p>
    </footer>
  </div>
</div>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AboutMe</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (function() {
      const pathname = window.location.pathname;
      if (pathname.includes('/fo/') || pathname.includes('/da/')) return;

      const userLang = navigator.language || navigator.userLanguage;
      const langCode = userLang.split('-')[0];
      
      const knownLangs = ['fo', 'da'];
      if (!knownLangs.includes(langCode)) return;

      // Detect base path (e.g. "/mypage/" or "/")
      // We look for everything before the first known route ("about")
      const segments = pathname.split('/').filter(s => s.length > 0);
      const knownRoutes = ['about'];
      let repoIndex = segments.length;
      for (let i = 0; i < segments.length; i++) {
        if (knownRoutes.includes(segments[i])) {
          repoIndex = i;
          break;
        }
      }
      
      const repoPath = segments.slice(0, repoIndex).join('/');
      const routePath = segments.slice(repoIndex).join('/');
      const prefix = repoPath ? '/' + repoPath + '/' : '/';
      
      window.location.href = prefix + langCode + '/' + routePath;
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
